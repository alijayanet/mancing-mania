<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Admin - Mancing Mania</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .login-container {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, hsl(222, 47%, 5%) 0%, hsl(222, 47%, 12%) 100%);
    }
    .login-card {
      width: 100%;
      max-width: 400px;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-card glass-card">
      <div style="text-align: center; margin-bottom: 32px;">
        <span style="font-size: 3rem; color: var(--primary-light); animation: logo-float 3s ease-in-out infinite alternate; display: inline-block;">
          <i class="fa-solid fa-lock"></i>
        </span>
        <h2 style="color: #fff; margin-top: 16px;">Admin Login</h2>
        <p style="color: var(--text-muted); font-size: 0.9rem;">Mancing Mania Portal Control</p>
      </div>

      <form id="login-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Masukkan username admin" required>
        </div>
        <div class="form-group" style="margin-bottom: 24px;">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Masukkan password admin" required>
        </div>

        <div id="login-error" style="color: #ff3333; font-size: 0.9rem; margin-bottom: 20px; text-align: center; display: none; background: rgba(255, 0, 0, 0.1); padding: 10px; border-radius: var(--radius-sm); border: 1px solid rgba(255, 0, 0, 0.2);">
          <!-- Error message goes here -->
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">
          <i class="fa-solid fa-right-to-bracket"></i> Masuk Dashboard
        </button>
      </form>

      <div style="text-align: center; margin-top: 24px;">
        <a href="/" style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem;"><i class="fa-solid fa-arrow-left"></i> Kembali ke Website</a>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Check session
      fetch('/api/admin/check-session')
        .then(res => res.json())
        .then(data => {
          if (data.loggedIn) {
            window.location.href = '/admin/dashboard.html';
          }
        });

      const form = document.getElementById('login-form');
      const errDiv = document.getElementById('login-error');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errDiv.style.display = 'none';

        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        try {
          const res = await fetch('/api/admin/login', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ username, password })
          });

          const data = await res.json();

          if (res.ok) {
            window.location.href = '/admin/dashboard.html';
          } else {
            errDiv.innerText = data.error || 'Login gagal.';
            errDiv.style.display = 'block';
          }
        } catch (err) {
          errDiv.innerText = 'Kesalahan jaringan. Gagal login.';
          errDiv.style.display = 'block';
        }
      });
    });
  </script>
</body>
</html>
